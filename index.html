<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>蛊 · Demon's Ascension</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Title / save-slot screen -->
  <div id="title">
    <div class="sub">Reverend Insanity · Cultivation Autobattler</div>
    <h1><span class="accent">蛊</span> Demon's Ascension</h1>
    <div class="slots" id="slots"></div>
  </div>

  <!-- Main game -->
  <div id="game" class="hidden">
    <div id="topbar">
      <span class="logo">蛊</span>
      <div class="stat"><span class="lbl">Primeval Stones</span><span class="val stone" id="t-stones">0</span></div>
      <div class="stat"><span class="lbl">Immortal Essence</span><span class="val jade" id="t-essence">0</span></div>
      <div class="stat" id="t-imm-stones-wrap" style="display:none" title="Immortal Essence Stones (仙石) — the fuel that powers immortal-rank Gu. Unlocked once a cultivator reaches Rank 6."><span class="lbl">Immortal Stones</span><span class="val immstone" id="t-imm-stones">0</span></div>
      <div class="stat"><span class="lbl">Frontier</span><span class="val" id="t-frontier">Floor 1</span></div>
      <div class="stat"><span class="lbl">Cultivators</span><span class="val" id="t-roster">1</span></div>
      <div class="stat"><span class="lbl">Unique Gu</span><span class="val" id="t-unique">0</span></div>
      <span class="spacer"></span>
      <div class="topbar-actions">
        <div class="tb-online" id="t-online-wrap" style="display:none" title="Cultivators currently online" aria-label="Players online">
          <span class="tb-online-dot" aria-hidden="true"></span>
          <b class="tb-online-num" id="t-online">0</b>
          <span class="tb-online-lbl">online</span>
        </div>
        <a class="tb-link tb-kofi" href="https://ko-fi.com/alexiss12341" target="_blank" rel="noopener noreferrer" title="Support me on Ko-fi" aria-label="Support me on Ko-fi">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M4 4h12v6a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4z" fill="currentColor"/>
            <path d="M16 6h2.5a2.5 2.5 0 0 1 0 5H16" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <path d="M4.5 19h11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </a>
        <a class="tb-link tb-discord" href="https://discord.gg/jkKpkkAgnX" target="_blank" rel="noopener noreferrer" title="Join the Discord" aria-label="Join the Discord">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M20.317 4.3698a19.7913 19.7913 0 0 0-4.8851-1.5152.0741.0741 0 0 0-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 0 0-.0785-.037 19.7363 19.7363 0 0 0-4.8852 1.515.0699.0699 0 0 0-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 0 0 .0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 0 0 .0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 0 0-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 0 1-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 0 1 .0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 0 1 .0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 0 1-.0066.1276 12.2986 12.2986 0 0 1-1.873.8914.0766.0766 0 0 0-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 0 0 .0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 0 0 .0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 0 0-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/>
          </svg>
        </a>
        <button onclick="G.toTitle()">Save &amp; Title</button>
      </div>
    </div>
    <div id="main">
      <div id="nav">
        <button class="nav-toggle" onclick="G.toggleNav()" aria-label="Collapse menu">«</button>
        <div class="nav-scroll">
          <div class="nav-group" data-group="combat">
            <button class="nav-grp-head" onclick="G.toggleNavGroup('combat')" aria-label="Toggle Combat group"><span class="nav-grp-ico" aria-hidden="true">戦</span><span class="nav-grp-lbl">Combat</span><span class="nav-grp-chev" aria-hidden="true">▾</span></button>
            <button data-tab="battle" class="active" onclick="G.setTab('battle')" aria-label="Battle"><span class="nav-ico" aria-hidden="true">⚔</span><span class="nav-lbl">Battle</span></button>
            <button data-tab="floors" onclick="G.setTab('floors')" aria-label="Floors"><span class="nav-ico" aria-hidden="true">塔</span><span class="nav-lbl">Floors</span></button>
            <button data-tab="bounties" onclick="G.setTab('bounties')" aria-label="Bounties"><span class="nav-ico" aria-hidden="true">賞</span><span class="nav-lbl">Bounties</span></button>
            <button data-tab="pvp" onclick="G.openArena()" aria-label="Arena"><span class="nav-ico" aria-hidden="true">擂</span><span class="nav-lbl">Arena</span></button>
            <button data-tab="quests" onclick="G.setTab('quests')" aria-label="Quests"><span class="nav-ico" aria-hidden="true">日</span><span class="nav-lbl">Quests</span><span class="navbadges"><span class="navbadge quest" id="quest-alert" title="Daily quest rewards ready to claim"></span></span></button>
          </div>
          <div class="nav-group" data-group="roster">
            <button class="nav-grp-head" onclick="G.toggleNavGroup('roster')" aria-label="Toggle Roster group"><span class="nav-grp-ico" aria-hidden="true">衆</span><span class="nav-grp-lbl">Roster</span><span class="nav-grp-chev" aria-hidden="true">▾</span></button>
            <button data-tab="char" onclick="G.openCharTab()" aria-label="Character"><span class="nav-ico" aria-hidden="true">己</span><span class="nav-lbl">Character</span></button>
            <button data-tab="team" onclick="G.setTab('team')" aria-label="Team"><span class="nav-ico" aria-hidden="true">人</span><span class="nav-lbl">Team</span><span class="navbadges"><span class="navbadge dup" id="dup-alert" title="Duplicate cultivators ready to Soul Imprint"></span><span class="navbadge" id="team-alert" title="Fighters with unspent attribute points"></span></span></button>
            <button data-tab="formation" onclick="G.setTab('formation')" aria-label="Formation"><span class="nav-ico" aria-hidden="true">阵</span><span class="nav-lbl">Formation</span></button>
            <button data-tab="recruit" onclick="G.setTab('recruit')" aria-label="Recruit"><span class="nav-ico" aria-hidden="true">召</span><span class="nav-lbl">Recruit</span></button>
          </div>
          <div class="nav-group" data-group="cultivation">
            <button class="nav-grp-head" onclick="G.toggleNavGroup('cultivation')" aria-label="Toggle Cultivation group"><span class="nav-grp-ico" aria-hidden="true">修</span><span class="nav-grp-lbl">Cultivation</span><span class="nav-grp-chev" aria-hidden="true">▾</span></button>
            <button data-tab="dao" onclick="G.setTab('dao')" aria-label="Dao"><span class="nav-ico" aria-hidden="true">道</span><span class="nav-lbl">Dao</span></button>
            <button data-tab="attainment" onclick="G.setTab('attainment')" aria-label="Attainment"><span class="nav-ico" aria-hidden="true">悟</span><span class="nav-lbl">Attainment</span></button>
          </div>
          <div class="nav-group" data-group="workshop">
            <button class="nav-grp-head" onclick="G.toggleNavGroup('workshop')" aria-label="Toggle Workshop group"><span class="nav-grp-ico" aria-hidden="true">匠</span><span class="nav-grp-lbl">Workshop</span><span class="nav-grp-chev" aria-hidden="true">▾</span></button>
            <button data-tab="gu" onclick="G.setTab('gu')" aria-label="Gu Refinery"><span class="nav-ico" aria-hidden="true">蛊</span><span class="nav-lbl">Gu Refinery</span></button>
            <button data-tab="shop" onclick="G.setTab('shop')" aria-label="Market"><span class="nav-ico" aria-hidden="true">市</span><span class="nav-lbl">Market</span></button>
            <button data-tab="inv" onclick="G.setTab('inv')" aria-label="Inventory"><span class="nav-ico" aria-hidden="true">囊</span><span class="nav-lbl">Inventory</span></button>
          </div>
          <div class="nav-group" data-group="records">
            <button class="nav-grp-head" onclick="G.toggleNavGroup('records')" aria-label="Toggle Records group"><span class="nav-grp-ico" aria-hidden="true">録</span><span class="nav-grp-lbl">Records</span><span class="nav-grp-chev" aria-hidden="true">▾</span></button>
            <button data-tab="almanac" onclick="G.setTab('almanac')" aria-label="Almanac"><span class="nav-ico" aria-hidden="true">谱</span><span class="nav-lbl">Almanac</span></button>
            <button data-tab="codex" onclick="G.setTab('codex')" aria-label="Guide"><span class="nav-ico" aria-hidden="true">典</span><span class="nav-lbl">Guide</span></button>
            <button data-tab="whatsnew" onclick="G.setTab('whatsnew')" aria-label="What's New"><span class="nav-ico" aria-hidden="true">新</span><span class="nav-lbl">What's New</span></button>
          </div>
        </div>
      </div>
      <div id="content"></div>
    </div>
  </div>

  <div id="toast-host"></div>
  <div id="banner-host"></div>
  <div id="onboard-host"></div>
  <button id="settings-fab" title="Settings" onclick="G.openSettings()">⚙</button>
  <script type="module" src="src/main.js"></script>
</body>
</html>
